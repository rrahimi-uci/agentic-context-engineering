name: Publish to PyPI

# Publishes the package to PyPI when you create a GitHub Release.
# Uses PyPI Trusted Publishing (OIDC) — no API token is stored in the repo.
#
# One-time setup on PyPI (https://pypi.org/manage/account/publishing/):
#   Project name:   ace-playbook
#   Owner:          rrahimi-uci
#   Repository:     agentic-context-engineering
#   Workflow name:  publish.yml
#   Environment:    pypi

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          python -m twine check dist/*
      - uses: actions/upload-artifact@v6
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/ace-playbook/
    permissions:
      id-token: write   # required for trusted publishing
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
