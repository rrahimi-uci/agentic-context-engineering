name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run tests
        run: pytest -q
      - name: Smoke-test demos (offline, no API key)
        run: |
          python examples/01_quickstart.py
          python examples/02_context_collapse.py
          python examples/03_offline_vs_online.py
          ace demo

  integration:
    # Exercises the OpenAI Agents SDK integration with the real SDK installed
    # (no network: the Runner and OpenAI client are mocked in the tests).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install with all extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all]"
      - name: Run full suite (incl. OpenAI Agents SDK integration)
        run: pytest -q
